name: Release

# Push a version tag (e.g. v1.0.1) and this builds, packages with Velopack,
# and publishes a GitHub Release. Installed apps then auto-update to it.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # allow the workflow to create/upload the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish SaveGuard/SaveGuard.csproj
          -c Release -r win-x64 --self-contained true
          -o publish
          /p:Version=${{ steps.ver.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Package
        run: >
          vpk pack
          --packId SaveGuard
          --packTitle SaveGuard
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish
          --mainExe SaveGuard.exe
          --icon SaveGuard/Assets/saveguard.ico

      - name: Publish to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/HouseAlwaysWin/SaveGuard
          --publish
          --releaseName "SaveGuard ${{ steps.ver.outputs.version }}"
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}
